<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEU Library – Check In</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="icon" href="assets/neu-logo.png" />
  <style>
    .purpose-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }
    .purpose-option { display: none; }
    .purpose-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 10px;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gray-700);
      background: var(--gray-100);
    }
    .purpose-label:hover {
      border-color: var(--blue-mid);
      background: var(--blue-pale);
      color: var(--blue-dark);
    }
    .purpose-option:checked + .purpose-label {
      border-color: var(--blue-dark);
      background: var(--blue-dark);
      color: var(--white);
      box-shadow: 0 4px 12px rgba(10,36,99,0.22);
    }
    .purpose-icon { font-size: 1.5rem; line-height: 1; }
  </style>
</head>
<body>

<div class="page-wrapper">

  <aside class="left-panel">
    <div class="left-panel-inner">

      <header class="neu-header">
        <img src="assets/neu-logo.png" alt="NEU Logo" class="neu-logo-mark" />
        <div class="neu-title">
          <span class="school-name">New Era University</span>
          <span class="system-name">Library Visitor System</span>
        </div>
      </header>

      <!-- User info bar -->
      <div class="user-info-bar">
        <img src="assets/default-avatar.png" alt="User Avatar"
          class="user-avatar" id="user-avatar"
          onerror="this.style.display='none'" />
        <div class="user-details">
          <div class="user-name" id="user-name">Loading…</div>
          <div class="user-sub" id="user-id" style="opacity:0.65; font-size:0.75rem;"></div>
        </div>
        <button class="btn-logout-sm" id="logout-btn" type="button">Sign Out</button>
      </div>

      <h1 class="page-title">Library Check-In</h1>
      <p class="page-subtitle">Select your purpose to log your visit.</p>

      <div class="error-msg" id="error-msg" role="alert"></div>

      <form id="checkin-form" novalidate>

        <div class="form-group">
          <label>Purpose of Visit <span class="req">*</span></label>
          <div class="purpose-grid">

            <input type="radio" name="purpose-radio" id="p1" class="purpose-option"
              value="Reading / Browsing Books" />
            <label for="p1" class="purpose-label">
              <span class="purpose-icon">📖</span>
              Reading / Browsing
            </label>

            <input type="radio" name="purpose-radio" id="p2" class="purpose-option"
              value="Research / Thesis Work" />
            <label for="p2" class="purpose-label">
              <span class="purpose-icon">🔬</span>
              Research / Thesis
            </label>

            <input type="radio" name="purpose-radio" id="p3" class="purpose-option"
              value="Use of Library Computer" />
            <label for="p3" class="purpose-label">
              <span class="purpose-icon">💻</span>
              Use of Computer
            </label>

            <input type="radio" name="purpose-radio" id="p4" class="purpose-option"
              value="Doing Assignments / Schoolwork" />
            <label for="p4" class="purpose-label">
              <span class="purpose-icon">✏️</span>
              Assignments
            </label>

            <input type="radio" name="purpose-radio" id="p5" class="purpose-option"
              value="Borrowing / Returning Books" />
            <label for="p5" class="purpose-label">
              <span class="purpose-icon">📚</span>
              Borrow / Return
            </label>

            <input type="radio" name="purpose-radio" id="p6" class="purpose-option"
              value="Group Study" />
            <label for="p6" class="purpose-label">
              <span class="purpose-icon">👥</span>
              Group Study
            </label>

          </div>

          <!-- Hidden select mirrors the radio selection -->
          <select id="purpose" name="purpose" style="display:none"></select>
        </div>

        <button class="btn btn-gold" type="submit" id="submit-btn">
          ✔ Check In Now
        </button>
      </form>

    </div>
  </aside>

  <section class="right-panel" aria-hidden="true">
    <div class="right-tagline">
      <h2>Ready to <span>Learn?</span></h2>
      <p>Log your visit to help the library track usage and ensure
        resources are always available for every NEU student and faculty member.</p>
    </div>
  </section>

</div>

<script type="module">
  document.querySelectorAll('input[name="purpose-radio"]').forEach((radio) => {
    radio.addEventListener('change', () => {
      document.getElementById('purpose').value = radio.value;
    });
  });
</script>

<script type="module" src="js/checkin.js"></script>

</body>
</html>
