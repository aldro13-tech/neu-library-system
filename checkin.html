<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEU Library – Check In</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="icon" href="assets/neu-logo.png" />
  <style>
    .purpose-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    /* Hide the real checkbox */
    .purpose-option { display: none; }

    .purpose-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 10px;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gray-700);
      background: var(--gray-100);
      position: relative;
    }

    .purpose-label:hover {
      border-color: var(--blue-mid);
      background: var(--blue-pale);
      color: var(--blue-dark);
    }

    /* Selected state */
    .purpose-option:checked + .purpose-label {
      border-color: var(--blue-dark);
      background: var(--blue-dark);
      color: var(--white);
      box-shadow: 0 4px 12px rgba(10,36,99,0.22);
    }

    /* Checkmark badge on selected */
    .purpose-option:checked + .purpose-label::after {
      content: '✓';
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 0.7rem;
      font-weight: 900;
      background: var(--gold);
      color: var(--blue-dark);
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 16px;
    }

    .purpose-icon { font-size: 1.5rem; line-height: 1; }

    .selection-hint {
      font-size: 0.78rem;
      color: var(--gray-400);
      margin-bottom: 10px;
      font-style: italic;
    }

    .selected-count {
      font-size: 0.78rem;
      color: var(--blue-mid);
      font-weight: 600;
      margin-top: 6px;
      margin-bottom: 4px;
      min-height: 18px;
    }
  </style>
</head>
<body>

<div class="page-wrapper">

  <aside class="left-panel">
    <div class="left-panel-inner">

      <header class="neu-header">
        <img src="assets/neu-logo.png" alt="NEU Logo" class="neu-logo-mark" />
        <div class="neu-title">
          <span class="school-name">New Era University</span>
          <span class="system-name">Library Visitor System</span>
        </div>
      </header>

      <!-- User info bar -->
      <div class="user-info-bar">
        <img src="assets/default-avatar.png" alt="User Avatar"
          class="user-avatar" id="user-avatar"
          onerror="this.style.display='none'" />
        <div class="user-details">
          <div class="user-name" id="user-name">Loading…</div>
          <div class="user-sub" id="user-id" style="opacity:0.65; font-size:0.75rem;"></div>
        </div>
        <button class="btn-logout-sm" id="logout-btn" type="button">Sign Out</button>
      </div>

      <h1 class="page-title">Library Check-In</h1>
      <p class="page-subtitle">Select your purpose to log your visit.</p>

      <div class="error-msg" id="error-msg" role="alert"></div>

      <form id="checkin-form" novalidate>

        <div class="form-group">
          <label>Purpose of Visit <span class="req">*</span></label>
          <p class="selection-hint">You may select more than one.</p>

          <div class="purpose-grid">

            <input type="checkbox" name="purpose-check" id="p1"
              class="purpose-option" value="Reading / Browsing Books" />
            <label for="p1" class="purpose-label">
              <span class="purpose-icon">📖</span>
              Reading / Browsing
            </label>

            <input type="checkbox" name="purpose-check" id="p2"
              class="purpose-option" value="Research / Thesis Work" />
            <label for="p2" class="purpose-label">
              <span class="purpose-icon">🔬</span>
              Research / Thesis
            </label>

            <input type="checkbox" name="purpose-check" id="p3"
              class="purpose-option" value="Use of Library Computer" />
            <label for="p3" class="purpose-label">
              <span class="purpose-icon">💻</span>
              Use of Computer
            </label>

            <input type="checkbox" name="purpose-check" id="p4"
              class="purpose-option" value="Doing Assignments / Schoolwork" />
            <label for="p4" class="purpose-label">
              <span class="purpose-icon">✏️</span>
              Assignments
            </label>

            <input type="checkbox" name="purpose-check" id="p5"
              class="purpose-option" value="Borrowing / Returning Books" />
            <label for="p5" class="purpose-label">
              <span class="purpose-icon">📚</span>
              Borrow / Return
            </label>

            <input type="checkbox" name="purpose-check" id="p6"
              class="purpose-option" value="Group Study" />
            <label for="p6" class="purpose-label">
              <span class="purpose-icon">👥</span>
              Group Study
            </label>

          </div>

          <div class="selected-count" id="selected-count"></div>
        </div>

        <button class="btn btn-gold" type="submit" id="submit-btn">
          ✔ Check In Now
        </button>
      </form>

    </div>
  </aside>

  <section class="right-panel" aria-hidden="true">
    <div class="right-tagline">
      <h2>Ready to <span>Learn?</span></h2>
      <p>Log your visit to help the library track usage and ensure
        resources are always available for every NEU student and faculty member.</p>
    </div>
  </section>

</div>

<!-- Show live count of selected purposes -->
<script>
  document.querySelectorAll('input[name="purpose-check"]').forEach(function(cb) {
    cb.addEventListener('change', function() {
      var checked = document.querySelectorAll('input[name="purpose-check"]:checked');
      var countEl = document.getElementById('selected-count');
      if (countEl) {
        countEl.textContent = checked.length > 0
          ? checked.length + ' purpose' + (checked.length > 1 ? 's' : '') + ' selected'
          : '';
      }
    });
  });
</script>

<script type="module" src="js/checkin.js"></script>

</body>
</html>
